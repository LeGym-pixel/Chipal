name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Prepare, Configure Gradle and Build APK
      run: |
        APP_DIR=$(find . -name "app" -type d | head -n 1)
        if [ -z "$APP_DIR" ]; then
          echo "Error: 'app' directory not found in repository!"
          exit 1
        fi
        
        PROJECT_ROOT=$(dirname "$APP_DIR")
        echo "Found project root at: $PROJECT_ROOT"
        
        # Создаем папку libs и качаем либу
        mkdir -p "$APP_DIR/libs"
        curl -L -o "$APP_DIR/libs/libv2ray.aar" https://github.com/v2rayA/v2rayA-core/releases/latest/download/libv2ray.aar || \
        curl -L -o "$APP_DIR/libs/libv2ray.aar" https://github.com/XTLS/Xray-core/releases/latest/download/libv2ray.aar
        
        # Переходим в проект
        cd "$PROJECT_ROOT"
        
        # Генерируем нормальный оберточник через встроенную команду gradle, предварительно очистив старые файлы
        rm -rf gradlew gradlew.bat gradle/
        gradle wrapper --gradle-version 8.7 --distribution-type bin
        
        chmod +x gradlew
        
        # Запускаем сборку
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/app-debug.apk"
