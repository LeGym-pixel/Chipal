name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Prepare, Configure Gradle and Build APK
      run: |
        APP_DIR=$(find . -name "app" -type d | head -n 1)
        if [ -z "$APP_DIR" ]; then
          echo "Error: 'app' directory not found in repository!"
          exit 1
        fi
        
        PROJECT_ROOT=$(dirname "$APP_DIR")
        echo "Found project root at: $PROJECT_ROOT"
        
        # Создаем папку libs и качаем либу
        mkdir -p "$APP_DIR/libs"
        curl -L -o "$APP_DIR/libs/libv2ray.aar" https://github.com/v2rayA/v2rayA-core/releases/latest/download/libv2ray.aar || \
        curl -L -o "$APP_DIR/libs/libv2ray.aar" https://github.com/XTLS/Xray-core/releases/latest/download/libv2ray.aar
        
        # Переходим в проект
        cd "$PROJECT_ROOT"
        
        # Скачиваем и распаковываем Gradle 8.9 (совместим с текущим AGP)
        wget -q https://services.gradle.org/distributions/gradle-8.9-bin.zip
        unzip -q gradle-8.9-bin.zip
        GRADLE_BIN="$(pwd)/gradle-8.9/bin/gradle"
        
        # Настраиваем wrapper свойства на версию 8.9
        mkdir -p gradle/wrapper
        echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
        echo "distributionPath=wrapper/dists" » gradle/wrapper/gradle-wrapper.properties
        echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-bin.zip" » gradle/wrapper/gradle-wrapper.properties
        echo "networkTimeout=10000" » gradle/wrapper/gradle-wrapper.properties
        echo "validateDistributionUrl=true" » gradle/wrapper/gradle-wrapper.properties
        echo "zipStoreBase=GRADLE_USER_HOME" » gradle/wrapper/gradle-wrapper.properties
        echo "zipStorePath=wrapper/dists" » gradle/wrapper/gradle-wrapper.properties
        
        # Генерируем gradlew с помощью скачанного Gradle 8.9
        "$GRADLE_BIN" wrapper --gradle-version 8.9
        
        chmod +x gradlew
        
        # Запускаем сборку через локальный gradlew
        ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/app-debug.apk"
