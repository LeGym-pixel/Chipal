name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Create libs dir if not exists
      run: mkdir -p PeladuVPN/SVPN/app/libs

    - name: Download prebuilt libv2ray.aar
      run: |
        curl -L -o PeladuVPN/SVPN/app/libs/libv2ray.aar https://github.com/v2rayA/v2rayA-core/releases/latest/download/libv2ray.aar || \
        curl -L -o PeladuVPN/SVPN/app/libs/libv2ray.aar https://github.com/XTLS/Xray-core/releases/latest/download/libv2ray.aar

    - name: Build Debug APK
      working-directory: PeladuVPN/SVPN
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: PeladuVPN/SVPN/app/build/outputs/apk/debug/app-debug.apk
