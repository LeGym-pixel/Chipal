name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Prepare Project and Libs
      run: |
        # Посмотрим структуру папок, чтобы понять, где мы находимся
        ls -la
        
        # Находим папку, где лежит build.gradle или папка app
        APP_DIR=$(find . -name "app" -type d | head -n 1)
        if [ -z "$APP_DIR" ]; then
          echo "Error: 'app' directory not found in repository!"
          exit 1
        fi
        
        PROJECT_ROOT=$(dirname "$APP_DIR")
        echo "PROJECT_ROOT=$PROJECT_ROOT"
        
        # Создаем папку libs и качаем либу
        mkdir -p "$APP_DIR/libs"
        curl -L -o "$APP_DIR/libs/libv2ray.aar" https://github.com/v2rayA/v2rayA-core/releases/latest/download/libv2ray.aar || \
        curl -L -o "$APP_DIR/libs/libv2ray.aar" https://github.com/XTLS/Xray-core/releases/latest/download/libv2ray.aar
        
        # Генерируем обертку gradlew, если её нет
        cd "$PROJECT_ROOT"
        if [ ! -f "gradlew" ]; then
          gradle wrapper --gradle-version 8.5
        fi
        
        chmod +x gradlew
        echo "PROJECT_PATH=$PROJECT_ROOT" » $GITHUB_ENV

    - name: Build Debug APK
      run: |
        cd ${{ env.PROJECT_PATH }}
        ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: "**/build/outputs/apk/debug/app-debug.apk"
